name: cabage_ai
description: "A mobile application for cabbage disease classification using deep learning."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  tflite_flutter: ^0.12.0
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  provider: ^6.1.1
  image: ^4.1.3
  intl: ^0.19.0
  table_calendar: ^3.1.2
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  http: ^1.2.1
  fl_chart: ^0.66.0
  shimmer: ^3.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_tts: ^3.8.3
  share_plus: ^7.2.2
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  supabase_flutter: ^2.5.0
  path: ^1.9.0
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.2.5
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/c7.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - cab.env
